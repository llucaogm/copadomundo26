<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email confirmado · Caô da Copa</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500;700;800&family=Bungee&family=Bungee+Shade&family=Special+Elite&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f3e6c4;--paper2:#ede0b6;--ink:#1a1410;--ink2:#3a2d1f;--muted:#7a6a4e;
  --verde:#009c3b;--verde-d:#006d29;--amarelo:#ffd91a;--azul:#002776;
  --vermelho:#d52941;--cream:#fff5d9;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;background:var(--paper);font-family:'Archivo',system-ui,sans-serif;color:var(--ink)}
body{
  background-image:
    radial-gradient(circle at 18% 12%, rgba(0,156,59,.07) 0, transparent 38%),
    radial-gradient(circle at 82% 88%, rgba(0,39,118,.08) 0, transparent 42%),
    radial-gradient(rgba(26,20,16,.18) 1px, transparent 1.4px);
  background-size:auto,auto,14px 14px;
  background-attachment:fixed;
}

header{
  background:repeating-linear-gradient(-45deg, var(--verde) 0 60px, var(--amarelo) 60px 120px, var(--azul) 120px 180px);
  border-bottom:5px solid var(--ink);
  padding:10px 20px;text-align:center;position:relative;overflow:hidden;
}
header::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 12% 80%, rgba(255,217,26,.4) 0 80px, transparent 110px),
    radial-gradient(circle at 88% 18%, rgba(255,75,139,.45) 0 70px, transparent 100px),
    repeating-linear-gradient(0deg, rgba(0,0,0,.06) 0 1px, transparent 1px 4px);
  mix-blend-mode:overlay;pointer-events:none;
}
header::after{
  content:"★ ★ ★ ★ ★";position:absolute;bottom:-6px;left:0;right:0;
  font-family:'Bungee',sans-serif;color:var(--amarelo);font-size:1.4rem;
  letter-spacing:30px;text-shadow:2px 2px 0 var(--ink);opacity:.9;
}
.logo-img{height:clamp(80px,14vw,140px);width:auto;display:block;margin:0 auto;filter:drop-shadow(4px 4px 0 rgba(0,0,0,.5));position:relative;z-index:2}

main{
  display:flex;align-items:center;justify-content:center;
  min-height:calc(100vh - 140px);padding:40px 20px;
}

.confirm-card{
  background:var(--cream);border:4px solid var(--ink);
  box-shadow:10px 10px 0 var(--verde);
  padding:40px 44px;text-align:center;
  max-width:480px;width:100%;position:relative;
  animation:popIn .5s cubic-bezier(.18,.9,.4,1.2) both;
}
@keyframes popIn{from{opacity:0;transform:scale(.9) rotate(-2deg)}to{opacity:1;transform:none}}

.confirm-card::before{
  content:"";position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:120px;height:28px;background:var(--amarelo);
  border:2px solid rgba(26,20,16,.4);
  background-image:repeating-linear-gradient(90deg, var(--amarelo) 0 12px, rgba(255,217,26,.55) 12px 14px);
}

.confirm-icon{font-size:3.5rem;line-height:1;margin-bottom:16px;display:block;animation:bounce 1s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}

.confirm-title{
  font-family:'Bungee',sans-serif;font-size:1.8rem;color:var(--ink);
  text-transform:uppercase;letter-spacing:1px;
  text-shadow:3px 3px 0 var(--verde);margin-bottom:12px;
}

.confirm-sub{
  font-family:'Special Elite',monospace;font-size:.95rem;color:var(--ink2);
  line-height:1.7;margin-bottom:28px;
}

.confirm-btn{
  display:inline-block;padding:14px 32px;
  background:var(--verde);color:var(--cream);
  border:3px solid var(--ink);cursor:pointer;
  font-family:'Anton',sans-serif;font-size:1.1rem;letter-spacing:2px;text-transform:uppercase;
  box-shadow:5px 5px 0 var(--ink);transition:all .15s;
  text-decoration:none;
}
.confirm-btn:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--azul);background:var(--verde-d)}

.confirm-countdown{
  font-family:'VT323',monospace;font-size:1rem;color:var(--muted);
  margin-top:18px;letter-spacing:1px;
}
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="Caô da Copa" class="logo-img">
</header>

<main>
  <div class="confirm-card">
    <span class="confirm-icon">✅</span>
    <div class="confirm-title">Email confirmado!</div>
    <p class="confirm-sub">
      Boa. Sua conta tá ativa e você já pode entrar no Bolão do Caô.<br>
      Vai lá cravar seus palpites antes que o juiz apite.
    </p>
    <a href="index.html" class="confirm-btn">Ir para o Bolão →</a>
    <div class="confirm-countdown" id="countdown">Redirecionando em <span id="sec">5</span>s...</div>
  </div>
</main>

<script>
let s = 5;
const el = document.getElementById('sec');
const t = setInterval(() => {
  s--;
  if (el) el.textContent = s;
  if (s <= 0) { clearInterval(t); location.href = 'index.html'; }
}, 1000);
</script>
</body>
</html>
