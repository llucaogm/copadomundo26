document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:'Bungee',sans-serif;\n  border:3px solid var(--ink);padding:10px 14px;\n  background:var(--amarelo);color:var(--ink);font-size:.85rem;letter-spacing:2px;\n  box-shadow:4px 4px 0 var(--ink);text-transform:uppercase;\n  z-index:5;pointer-events:none;\n}\n\n/* ─── RESPONSIVE ─── */\n@media(max-width:780px){\n  header h1{font-size:2.2rem;letter-spacing:1px;text-shadow:3px 3px 0 var(--vermelho),6px 6px 0 var(--azul),9px 9px 0 var(--ink)}\n  .bora{top:14px;right:10px;font-size:1rem;padding:8px 12px}\n  .hdr-tape{display:none}\n  .groups-grid{grid-template-columns:1fr}\n  .mc-inner{flex-wrap:wrap;gap:10px}\n  .mc-teams{grid-template-columns:1fr auto 1fr}\n  nav button{min-width:120px;font-size:.85rem;padding:14px 8px}\n  .content{padding:20px 14px 60px}\n  h2.sec-title{font-size:1.4rem}\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<header>\n  <div class=\"hdr-tape l\"><\u002Fdiv>\n  <div class=\"hdr-tape r\"><\u002Fdiv>\n\n  <div class=\"rt-bar\">\n    <span class=\"rt-dot\" id=\"rtDot\"><\u002Fspan>\n    <span id=\"rtLabel\">conectando...<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"title-wrap\">\n    <h1><span class=\"ball\">⚽<\u002Fspan> Copa 2026<\u002Fh1>\n  <\u002Fdiv>\n  <br>\n  <div class=\"subtitle\">EUA · CANADÁ · MÉXICO <b>·<\u002Fb> 11 JUN — 26 JUL 2026<\u002Fdiv>\n\n  <div class=\"bora\">BORA<small>BRASIL!<\u002Fsmall><\u002Fdiv>\n<\u002Fheader>\n\n<nav>\n  <button class=\"active\" onclick=\"showTab('grupos',this)\"><span class=\"lbl\">🏆 Grupos<\u002Fspan><\u002Fbutton>\n  <button onclick=\"showTab('classificacao',this)\"><span class=\"lbl\">📊 Classificação<\u002Fspan><\u002Fbutton>\n  <button onclick=\"showTab('matamata',this)\"><span class=\"lbl\">⚔️ Mata-Mata<\u002Fspan><\u002Fbutton>\n  <button onclick=\"showTab('jogos',this)\"><span class=\"lbl\">📅 Todos os Jogos<\u002Fspan><\u002Fbutton>\n<\u002Fnav>\n\n<div class=\"content\">\n\n  <!-- ── GRUPOS ── -->\n  <div id=\"tab-grupos\" class=\"tab active\">\n    <h2 class=\"sec-title\">Grupos da Copa<\u002Fh2>\n    <p class=\"sec-sub\">12 grupos · 4 times cada · classificam os 2 primeiros + 8 melhores 3ºs<\u002Fp>\n    <div class=\"loading\" id=\"loadingGroups\"><div class=\"spinner\"><\u002Fdiv><div>Carregando dados da copa...<\u002Fdiv><\u002Fdiv>\n    <div class=\"groups-grid\" id=\"groupsGrid\" style=\"display:none\"><\u002Fdiv>\n    <div class=\"legend\" id=\"groupLegend\" style=\"display:none\">\n      <div><span class=\"leg-dot\" style=\"background:var(--verde)\"><\u002Fspan>Classificado direto (1° / 2°)<\u002Fdiv>\n      <div><span class=\"leg-dot\" style=\"background:var(--azul)\"><\u002Fspan>Possível 3° melhor<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ── CLASSIFICAÇÃO ── -->\n  <div id=\"tab-classificacao\" class=\"tab\">\n    <h2 class=\"sec-title\">Classificação Geral<\u002Fh2>\n    <p class=\"sec-sub\">Top 2 de cada grupo + 8 melhores 3ºs avançam para o mata-mata (32 times)<\u002Fp>\n    <div class=\"groups-grid\" id=\"classGrid\"><\u002Fdiv>\n    <div class=\"legend\" style=\"margin-top:18px\">\n      <div><span class=\"leg-dot\" style=\"background:var(--verde)\"><\u002Fspan>Classificado direto<\u002Fdiv>\n      <div><span class=\"leg-dot\" style=\"background:var(--azul)\"><\u002Fspan>Disputa vaga como 3° melhor<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ── MATA-MATA ── -->\n  <div id=\"tab-matamata\" class=\"tab\">\n    <h2 class=\"sec-title\">Fase Eliminatória<\u002Fh2>\n    <p class=\"sec-sub\">Clique em qualquer confronto para editar o placar<\u002Fp>\n    <div class=\"bracket-wrap\">\n      <div class=\"bracket-cols\" id=\"bracketGrid\">\n        <div class=\"loading\"><div class=\"spinner\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ── TODOS OS JOGOS ── -->\n  <div id=\"tab-jogos\" class=\"tab\">\n    <h2 class=\"sec-title\">Todos os Jogos<\u002Fh2>\n    <div class=\"sched-top\">\n      <input type=\"text\" class=\"search-box\" id=\"searchBox\" placeholder=\"🔍 buscar time, cidade, grupo...\" oninput=\"renderSchedule()\">\n      <div class=\"stage-filters\">\n        <button class=\"f-btn active\" onclick=\"setFilter('all',this)\">Todos<\u002Fbutton>\n        <button class=\"f-btn\" onclick=\"setFilter('group',this)\">Grupos<\u002Fbutton>\n        <button class=\"f-btn\" onclick=\"setFilter('r32',this)\">16 avos<\u002Fbutton>\n        <button class=\"f-btn\" onclick=\"setFilter('r16',this)\">Oitavas<\u002Fbutton>\n        <button class=\"f-btn\" onclick=\"setFilter('qf',this)\">Quartas<\u002Fbutton>\n        <button class=\"f-btn\" onclick=\"setFilter('sf',this)\">Semis<\u002Fbutton>\n        <button class=\"f-btn\" onclick=\"setFilter('final',this)\">Final<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"schedContainer\"><\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<div class=\"toast-wrap\" id=\"toastWrap\"><\u002Fdiv>\n\n<script>\nconst SB_URL = 'https://ixsngduywvabrwbiohul.supabase.co';\nconst SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4c25nZHV5d3ZhYnJ3YmlvaHVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTA2NTksImV4cCI6MjA5NDA4NjY1OX0.d9xB9jqGiHzTB91ljIuHTQyDkt7EDmbKjIBqyKl-6Zo';\nconst sb = window.supabase.createClient(SB_URL, SB_KEY);\n\nlet teams={}, groups={}, venues={}, matches=[];\nlet stageFilter='all', activeTab='grupos';\n\nconst STAGE_LABEL={group:'Fase de Grupos',r32:'16 avos de Final',r16:'Oitavas de Final',qf:'Quartas de Final',sf:'Semifinal','3rd':'3° Lugar',final:'FINAL'};\nconst STAGE_CLASS={group:'bg-group',r32:'bg-r32',r16:'bg-r16',qf:'bg-qf',sf:'bg-sf',final:'bg-final','3rd':'bg-3rd'};\nconst MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];\nconst WEEKDAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];\n\nfunction flagCode(team){\n  if(!team) return null;\n  if(team.flag){\n    const cp=[...team.flag].map(c=>c.codePointAt(0));\n    if(cp.length===2 && cp.every(c=>c>=0x1F1E6 && c<=0x1F1FF)){\n      return cp.map(c=>String.fromCharCode(c-0x1F1E6+97)).join('');\n    }\n    if(/^[a-z]{2}$/i.test(team.flag)) return team.flag.toLowerCase();\n  }\n  if(team.code && /^[a-z]{2}$/i.test(team.code)) return team.code.toLowerCase();\n  return null;\n}\nfunction fimg(team, sz){\n  sz = sz || 'sm';\n  const c=flagCode(team);\n  if(!c) return `<span class=\"flagimg flag-na ${sz}\">🏳️<\u002Fspan>`;\n  return `<img class=\"flagimg ${sz}\" src=\"https://flagcdn.com/w80/${c}.png\" alt=\"\" loading=\"lazy\">`;\n}\n\nasync function init(){\n  await loadAll();\n  setupRealtime();\n  renderAll();\n}\n\nasync function loadAll(){\n  const [tr,gr,vr,mr] = await Promise.all([\n    sb.from('wc_teams').select('*'),\n    sb.from('wc_groups').select('*'),\n    sb.from('wc_venues').select('*'),\n    sb.from('wc_matches').select('*').order('match_number')\n  ]);\n  teams={}; (tr.data||[]).forEach(t=>teams[t.id]=t);\n  groups={}; (gr.data||[]).forEach(g=>groups[g.id]=g);\n  venues={}; (vr.data||[]).forEach(v=>venues[v.id]=v);\n  matches=mr.data||[];\n}\n\nfunction setupRealtime(){\n  sb.channel('wc2026').on('postgres_changes',{event:'*',schema:'public',table:'wc_matches'},p=>{\n    if(p.eventType==='DELETE') return;\n    const i=matches.findIndex(m=>m.id===p.new.id);\n    if(i>=0) matches[i]=p.new; else matches.push(p.new);\n    renderAll();\n    toast('Placar atualizado!','ok');\n  }).subscribe(s=>{\n    const dot=document.getElementById('rtDot');\n    const lbl=document.getElementById('rtLabel');\n    if(s==='SUBSCRIBED'){dot.className='rt-dot on';lbl.textContent='ao vivo · tempo real'}\n    else{dot.className='rt-dot';lbl.textContent='reconectando...'}\n  });\n}\n\nfunction renderAll(){\n  renderGroups();\n  renderSchedule();\n  renderBracket();\n  if(activeTab==='classificacao') renderClass();\n}\n\nfunction showTab(tab,btn){\n  activeTab=tab;\n  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));\n  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));\n  document.getElementById('tab-'+tab).classList.add('active');\n  btn.classList.add('active');\n  if(tab==='classificacao') renderClass();\n  if(tab==='matamata') renderBracket();\n}\n\n/* ── STANDINGS CALC ── */\nfunction calcStandings(gId){\n  const gt=Object.values(teams).filter(t=>t.group_id===gId);\n  const gm=matches.filter(m=>m.group_id===gId&&m.status==='finished');\n  const s={};\n  gt.forEach(t=>{s[t.id]={t,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0}});\n  gm.forEach(m=>{\n    const h=s[m.home_team_id],a=s[m.away_team_id];\n    if(!h||!a||m.home_score===null||m.away_score===null) return;\n    h.P++;a.P++;\n    h.GF+=m.home_score;h.GA+=m.away_score;\n    a.GF+=m.away_score;a.GA+=m.home_score;\n    if(m.home_score>m.away_score){h.W++;a.L++;h.Pts+=3}\n    else if(m.home_score<m.away_score){a.W++;h.L++;a.Pts+=3}\n    else{h.D++;a.D++;h.Pts++;a.Pts++}\n  });\n  Object.values(s).forEach(x=>x.GD=x.GF-x.GA);\n  return Object.values(s).sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF||a.t.name.localeCompare(b.t.name));\n}\n\n/* ── GROUPS ── */\nfunction renderGroups(){\n  const loading=document.getElementById('loadingGroups');\n  const grid=document.getElementById('groupsGrid');\n  const legend=document.getElementById('groupLegend');\n  if(!Object.keys(teams).length) return;\n  loading.style.display='none';\n  grid.style.display='grid';\n  legend.style.display='flex';\n  grid.innerHTML=['A','B','C','D','E','F','G','H','I','J','K','L'].map((g,i)=>groupCard(g,i)).join('');\n}\n\nfunction groupCard(gId,idx){\n  const st=calcStandings(gId);\n  const gm=matches.filter(m=>m.group_id===gId).sort((a,b)=>a.match_number-b.match_number);\n  const done=gm.filter(m=>m.status==='finished').length;\n  const rows=st.map((s,i)=>{\n    const rc=['r1','r2','r3','r4'][i]||'r4';\n    const qc=i<2?'q1':i===2?'q2':'q3';\n    const gdC=s.GD>0?'gd-pos':s.GD<0?'gd-neg':'';\n    return `<tr class=\"${qc}\">\n      <td><div class=\"team-cell\">\n        <span class=\"rank-badge ${rc}\">${i+1}<\u002Fspan>\n        ${fimg(s.t,'sm')}\n        <span class=\"tname\">${s.t.name}<\u002Fspan>\n      <\u002Fdiv><\u002Ftd>\n      <td>${s.P}<\u002Ftd><td>${s.W}<\u002Ftd><td>${s.D}<\u002Ftd><td>${s.L}<\u002Ftd>\n      <td>${s.GF}<\u002Ftd><td>${s.GA}<\u002Ftd>\n      <td class=\"${gdC}\">${s.GD>0?'+':''}${s.GD}<\u002Ftd>\n      <td class=\"pts-cell\">${s.Pts}<\u002Ftd>\n    <\u002Ftr>`;\n  }).join('');\n  const minis=gm.map(m=>miniMatch(m)).join('');\n  return `<div class=\"group-card\" style=\"animation-delay:${idx*60}ms\">\n    <div class=\"group-header\">\n      <h3>Grupo <b>${gId}<\u002Fb><\u002Fh3>\n      <span>${done}/6 ✓<\u002Fspan>\n    <\u002Fdiv>\n    <table class=\"standings-table\">\n      <thead><tr>\n        <th style=\"padding-left:14px\">Time<\u002Fth>\n        <th title=\"Jogos\">J<\u002Fth><th title=\"Vitórias\">V<\u002Fth><th title=\"Empates\">E<\u002Fth><th title=\"Derrotas\">D<\u002Fth>\n        <th title=\"Gols Pró\">GP<\u002Fth><th title=\"Gols Contra\">GC<\u002Fth><th title=\"Saldo\">SG<\u002Fth><th title=\"Pontos\">Pts<\u002Fth>\n      <\u002Ftr><\u002Fthead>\n      <tbody>${rows}<\u002Ftbody>\n    <\u002Ftable>\n    <div class=\"group-matches\">\n      <div class=\"gm-title\">⚽ Confrontos<\u002Fdiv>\n      ${minis}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction miniMatch(m){\n  const ht=m.home_team_id?teams[m.home_team_id]:null;\n  const at=m.away_team_id?teams[m.away_team_id]:null;\n  let sc;\n  if(m.status==='finished'){\n    sc=`<span class=\"mini-score\">${m.home_score}<span class=\"mid\">×<\u002Fspan>${m.away_score}<\u002Fspan>`;\n  }else if(m.status==='live'){\n    sc=`<span class=\"mini-score\">${m.home_score??0}<span class=\"live-dot\"><\u002Fspan>${m.away_score??0}<\u002Fspan>`;\n  }else{\n    sc=`<span class=\"mini-time\">${m.match_time.substring(0,5)}<\u002Fspan>`;\n  }\n  const dt=m.match_date.substring(5).replace('-','/');\n  return `<div class=\"mini-match\" onclick=\"goToMatch(${m.id})\">\n    <div class=\"mm-flags\">\n      ${fimg(ht,'sm')}\n      <span class=\"vs\">×<\u002Fspan>\n      ${fimg(at,'sm')}\n    <\u002Fdiv>\n    ${sc}\n    <span class=\"mini-date\">${dt}<\u002Fspan>\n  <\u002Fdiv>`;\n}\n\n/* ── SCHEDULE ── */\nfunction setFilter(f,btn){\n  stageFilter=f;\n  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));\n  btn.classList.add('active');\n  renderSchedule();\n}\n\nfunction renderSchedule(){\n  const q=(document.getElementById('searchBox')?.value||'').toLowerCase();\n  let list=matches;\n  if(stageFilter!=='all') list=list.filter(m=>m.stage===stageFilter||(stageFilter==='final'&&m.stage==='3rd'));\n  if(q){\n    list=list.filter(m=>{\n      const ht=m.home_team_id?teams[m.home_team_id]:null;\n      const at=m.away_team_id?teams[m.away_team_id]:null;\n      const v=venues[m.venue_id];\n      return [ht?.name,at?.name,ht?.code,at?.code,v?.city,v?.name,m.home_team_placeholder,m.away_team_placeholder,m.group_id]\n        .filter(Boolean).join(' ').toLowerCase().includes(q);\n    });\n  }\n  list=[...list].sort((a,b)=>a.match_number-b.match_number);\n  const byDate={};\n  list.forEach(m=>{if(!byDate[m.match_date]) byDate[m.match_date]=[];byDate[m.match_date].push(m)});\n  let html='';\n  Object.keys(byDate).sort().forEach(d=>{\n    const dt=new Date(d+'T12:00:00');\n    html+=`<div class=\"day-section\">\n      <div class=\"day-header\">\n        <span>📅 ${WEEKDAYS[dt.getDay()]}<\u002Fspan>\n        <span class=\"dh-num\">${dt.getDate()}<\u002Fspan>\n        <span>${MONTHS[dt.getMonth()]} ${dt.getFullYear()}<\u002Fspan>\n      <\u002Fdiv>\n      ${byDate[d].map(m=>matchCard(m)).join('')}\n    <\u002Fdiv>`;\n  });\n  document.getElementById('schedContainer').innerHTML=html||'<div style=\"color:var(--muted);text-align:center;padding:60px;font-family:\\'Special Elite\\',monospace\">Nenhum jogo encontrado<\u002Fdiv>';\n}\n\nfunction matchCard(m){\n  const ht=m.home_team_id?teams[m.home_team_id]:null;\n  const at=m.away_team_id?teams[m.away_team_id]:null;\n  const v=venues[m.venue_id];\n  const time=m.match_time.substring(0,5);\n  const sc=STAGE_CLASS[m.stage]||'bg-group';\n  const sl=m.group_id?'Grupo '+m.group_id:(STAGE_LABEL[m.stage]||m.stage);\n  const hDisp=ht?`${fimg(ht,'md')}<span class=\"tn\">${ht.name}<\u002Fspan>`:`<span class=\"ko-ph\">${m.home_team_placeholder||'A definir'}<\u002Fspan>`;\n  const aDisp=at?`<span class=\"tn\">${at.name}<\u002Fspan>${fimg(at,'md')}`:`<span class=\"ko-ph\">${m.away_team_placeholder||'A definir'}<\u002Fspan>`;\n  let scoreHtml;\n  if(m.status==='finished'){\n    const pen=m.home_penalties!==null?`<span style=\"font-family:'VT323',monospace;font-size:.8rem;color:var(--amarelo);margin-left:6px\">(${m.home_penalties}×${m.away_penalties}p)<\u002Fspan>`:'';\n    scoreHtml=`<div class=\"score-box\"><span class=\"sn\">${m.home_score}<\u002Fspan><span class=\"ss\">×<\u002Fspan><span class=\"sn\">${m.away_score}<\u002Fspan>${pen}<\u002Fdiv>`;\n  }else if(m.status==='live'){\n    scoreHtml=`<div class=\"score-box live\"><span class=\"sn\">${m.home_score??0}<\u002Fspan><span class=\"ss\" style=\"color:#fff\"><span class=\"live-dot\" style=\"background:#fff\"><\u002Fspan><\u002Fspan><span class=\"sn\">${m.away_score??0}<\u002Fspan><\u002Fdiv>`;\n  }else{\n    scoreHtml=`<div class=\"score-box\"><span class=\"score-tbd\">${time}<\u002Fspan><\u002Fdiv>`;\n  }\n  const resetBtn=m.status==='finished'?`<button class=\"btn-reset\" onclick=\"resetMatch(${m.id})\">⟳ Limpar<\u002Fbutton>`:'';\n  const penRow=m.stage!=='group'&&m.stage!=='r32'?`\n    <div class=\"pen-row\">\n      Pênaltis:\n      <input type=\"number\" min=\"0\" max=\"20\" id=\"hp-${m.id}\" value=\"${m.home_penalties??''}\" placeholder=\"C\" class=\"sc-input\" style=\"width:50px;height:36px;font-size:1.1rem\">\n      <span class=\"sc-sep\">×<\u002Fspan>\n      <input type=\"number\" min=\"0\" max=\"20\" id=\"ap-${m.id}\" value=\"${m.away_penalties??''}\" placeholder=\"F\" class=\"sc-input\" style=\"width:50px;height:36px;font-size:1.1rem\">\n    <\u002Fdiv>`:'';\n  const cardCls = m.status==='live' ? 'is-live' : m.status==='finished' ? 'is-finished' : '';\n  return `<div class=\"match-card ${cardCls}\" id=\"card-${m.id}\">\n    <div class=\"mc-inner\">\n      <div class=\"mc-meta\">\n        <div class=\"mc-time\">${time}<\u002Fdiv>\n        <div><span class=\"stage-badge ${sc}\">${sl}<\u002Fspan><\u002Fdiv>\n        <div class=\"mc-venue\">${v?v.city:''}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mc-teams\">\n        <div class=\"team-home\">${hDisp}<\u002Fdiv>\n        ${scoreHtml}\n        <div class=\"team-away\">${aDisp}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mc-actions\">\n        <button class=\"btn-edit\" onclick=\"toggleEditor(${m.id})\" title=\"Editar placar\">✏️<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"editor\" id=\"ed-${m.id}\">\n      <span class=\"sc-label\">${fimg(ht,'sm')}<\u002Fspan>\n      <input class=\"sc-input\" type=\"number\" min=\"0\" max=\"99\" id=\"hs-${m.id}\" value=\"${m.home_score??''}\" placeholder=\"0\">\n      <span class=\"sc-sep\">×<\u002Fspan>\n      <input class=\"sc-input\" type=\"number\" min=\"0\" max=\"99\" id=\"as-${m.id}\" value=\"${m.away_score??''}\" placeholder=\"0\">\n      <span class=\"sc-label\">${fimg(at,'sm')}<\u002Fspan>\n      <select class=\"st-select\" id=\"st-${m.id}\">\n        <option value=\"scheduled\" ${m.status==='scheduled'?'selected':''}>🕐 Agendado<\u002Foption>\n        <option value=\"live\" ${m.status==='live'?'selected':''}>🔴 Ao Vivo<\u002Foption>\n        <option value=\"finished\" ${m.status==='finished'?'selected':''}>✅ Finalizado<\u002Foption>\n      <\u002Fselect>\n      ${penRow}\n      <button class=\"btn-save\" onclick=\"saveMatch(${m.id})\">✓ Salvar<\u002Fbutton>\n      <button class=\"btn-cancel\" onclick=\"toggleEditor(${m.id})\">✕<\u002Fbutton>\n      ${resetBtn}\n    <\u002Fdiv>\n    <div class=\"mc-footer\">Jogo #${m.match_number} · ${v?.name||'—'} · ${v?.city||''}, ${v?.country||''}<\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ── EDIT ── */\nfunction toggleEditor(id){document.getElementById('ed-'+id)?.classList.toggle('open')}\n\nfunction goToMatch(id){\n  showTab('jogos',document.querySelectorAll('nav button')[3]);\n  setTimeout(()=>{\n    const c=document.getElementById('card-'+id);\n    if(c){c.scrollIntoView({behavior:'smooth',block:'center'});document.getElementById('ed-'+id)?.classList.add('open')}\n  },80);\n}\n\nasync function saveMatch(id){\n  const hs=document.getElementById('hs-'+id)?.value;\n  const as_=document.getElementById('as-'+id)?.value;\n  const st=document.getElementById('st-'+id)?.value;\n  const hp=document.getElementById('hp-'+id)?.value;\n  const ap=document.getElementById('ap-'+id)?.value;\n  if(hs===''||as_===''){toast('Digite os dois placares!','err');return}\n  const upd={home_score:parseInt(hs),away_score:parseInt(as_),status:st};\n  if(hp!==undefined) upd.home_penalties=hp!==''?parseInt(hp):null;\n  if(ap!==undefined) upd.away_penalties=ap!==''?parseInt(ap):null;\n  const {error}=await sb.from('wc_matches').update(upd).eq('id',id);\n  if(error){toast('Erro: '+error.message,'err');return}\n  const i=matches.findIndex(m=>m.id===id);\n  if(i>=0) Object.assign(matches[i],upd);\n  toggleEditor(id);\n  renderAll();\n  toast('✅ Placar salvo!','ok');\n}\n\nasync function resetMatch(id){\n  const upd={home_score:null,away_score:null,home_penalties:null,away_penalties:null,status:'scheduled'};\n  const {error}=await sb.from('wc_matches').update(upd).eq('id',id);\n  if(!error){\n    const i=matches.findIndex(m=>m.id===id);\n    if(i>=0) Object.assign(matches[i],upd);\n    toggleEditor(id);\n    renderAll();\n    toast('Placar limpo','ok');\n  }\n}\n\n/* ── BRACKET ── */\nfunction renderBracket(){\n  const rounds=[\n    {id:'r32',label:'16 avos de Final'},\n    {id:'r16',label:'Oitavas de Final'},\n    {id:'qf',label:'Quartas'},\n    {id:'sf',label:'Semifinais'},\n    {id:'final',label:'Final & 3°'}\n  ];\n  const html=rounds.map(r=>{\n    const rm=matches.filter(m=>m.stage===r.id||(r.id==='final'&&(m.stage==='final'||m.stage==='3rd')))\n      .sort((a,b)=>a.match_number-b.match_number);\n    return `<div class=\"bracket-col\">\n      <div class=\"bracket-col-title\">${r.label}<\u002Fdiv>\n      <div class=\"bracket-matches\">${rm.map(m=>bracketMatch(m)).join('')}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n  document.getElementById('bracketGrid').innerHTML=html;\n}\n\nfunction bracketMatch(m){\n  const ht=m.home_team_id?teams[m.home_team_id]:null;\n  const at=m.away_team_id?teams[m.away_team_id]:null;\n  const hName=ht?`${fimg(ht,'sm')}<span class=\"bcode\">${ht.name}<\u002Fspan>`:`<span class=\"ko-ph\">${m.home_team_placeholder||'A definir'}<\u002Fspan>`;\n  const aName=at?`${fimg(at,'sm')}<span class=\"bcode\">${at.name}<\u002Fspan>`:`<span class=\"ko-ph\">${m.away_team_placeholder||'A definir'}<\u002Fspan>`;\n  const hScore=m.home_score!==null?m.home_score:'–';\n  const aScore=m.away_score!==null?m.away_score:'–';\n  const hWin=m.status==='finished'&&m.home_score!==null&&m.home_score>m.away_score;\n  const aWin=m.status==='finished'&&m.away_score!==null&&m.away_score>m.home_score;\n  const spec=m.stage==='final'?'🏆 FINAL':m.stage==='3rd'?'🥉 3° LUGAR':'';\n  const cls=m.stage==='final'?'is-final':m.stage==='3rd'?'is-3rd':'';\n  const dt=m.match_date.substring(5).replace('-','/');\n  return `<div class=\"bm ${cls}\" onclick=\"goToMatch(${m.id})\">\n    ${spec?`<div class=\"bm-label\">${spec}<\u002Fdiv>`:''}\n    <div class=\"bm-team ${hWin?'win':''}\">\n      <span class=\"bm-name\">${hName}<\u002Fspan>\n      <span class=\"bm-score\">${hScore}<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"bm-team ${aWin?'win':''}\">\n      <span class=\"bm-name\">${aName}<\u002Fspan>\n      <span class=\"bm-score\">${aScore}<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"bm-date\">${dt} · ${m.match_time.substring(0,5)} · ${venues[m.venue_id]?.city||''}<\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ── CLASSIFICAÇÃO ── */\nfunction renderClass(){\n  const gIds=['A','B','C','D','E','F','G','H','I','J','K','L'];\n  document.getElementById('classGrid').innerHTML=gIds.map((g,idx)=>{\n    const st=calcStandings(g);\n    const rows=st.map((s,i)=>{\n      const rc=['r1','r2','r3','r4'][i]||'r4';\n      const qc=i<2?'q1':i===2?'q2':'q3';\n      const gdC=s.GD>0?'gd-pos':s.GD<0?'gd-neg':'';\n      return `<tr class=\"${qc}\">\n        <td><div class=\"team-cell\">\n          <span class=\"rank-badge ${rc}\">${i+1}<\u002Fspan>\n          ${fimg(s.t,'sm')}\n          <span class=\"tname\">${s.t.name}<\u002Fspan>\n        <\u002Fdiv><\u002Ftd>\n        <td>${s.P}<\u002Ftd><td>${s.W}<\u002Ftd><td>${s.D}<\u002Ftd><td>${s.L}<\u002Ftd>\n        <td>${s.GF}<\u002Ftd><td>${s.GA}<\u002Ftd>\n        <td class=\"${gdC}\">${s.GD>0?'+':''}${s.GD}<\u002Ftd>\n        <td class=\"pts-cell\">${s.Pts}<\u002Ftd>\n      <\u002Ftr>`;\n    }).join('');\n    return `<div class=\"group-card\" style=\"animation-delay:${idx*50}ms\">\n      <div class=\"group-header\"><h3>Grupo <b>${g}<\u002Fb><\u002Fh3><span>★<\u002Fspan><\u002Fdiv>\n      <table class=\"standings-table\">\n        <thead><tr>\n          <th style=\"padding-left:14px\">Time<\u002Fth>\n          <th>J<\u002Fth><th>V<\u002Fth><th>E<\u002Fth><th>D<\u002Fth><th>GP<\u002Fth><th>GC<\u002Fth><th>SG<\u002Fth><th>Pts<\u002Fth>\n        <\u002Ftr><\u002Fthead>\n        <tbody>${rows}<\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n/* ── TOAST ── */\nfunction toast(msg,type){\n  const w=document.getElementById('toastWrap');\n  const t=document.createElement('div');\n  t.className=`toast ${type}`;t.textContent=msg;\n  w.appendChild(t);setTimeout(()=>{t.style.transition='all .3s';t.style.opacity='0';t.style.transform='translateX(120px) rotate(8deg)';setTimeout(()=>t.remove(),300)},3000);\n}\n\ninit();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
